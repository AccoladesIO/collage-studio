<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collage Studio</title>
    <meta name="description" content="A minimalist photo collage builder — upload, arrange, download.">
    <meta name="theme-color" content="#111111">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap');

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --border: #e0e0e0;
            --border-hover: #b8b8b8;
            --text: #111111;
            --text-muted: #999999;
            --accent: #111111;
            --radius: 10px;
            --gap: 4px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 36px 48px 0;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        header h1 {
            font-family: 'Instrument Serif', serif;
            font-weight: 400;
            font-size: 1.9rem;
            letter-spacing: -0.02em;
        }

        header h1 span {
            font-style: italic;
            color: var(--text-muted);
        }

        .status {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }

        .status strong {
            color: var(--text);
            font-weight: 500;
        }

        .section-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .picker-wrap {
            padding: 24px 48px 0;
        }

        .picker {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 6px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .layout-thumb {
            flex-shrink: 0;
            width: 100px;
            height: 70px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            padding: 5px;
            background: var(--surface);
            position: relative;
            overflow: hidden;
        }

        .layout-thumb.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent);
        }

        .layout-thumb .mini-grid {
            width: 100%;
            height: 100%;
            display: grid;
            gap: 1.5px;
        }

        .layout-thumb .mini-grid .cell {
            background: #e8e8e8;
            border-radius: 1.5px;
        }

        .layout-thumb .mini-grid .cell.circle {
            border-radius: 50%;
        }

        .layout-thumb .count-badge {
            position: absolute;
            bottom: 3px;
            right: 3px;
            background: var(--accent);
            color: #fff;
            font-size: 0.55rem;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: grid;
            place-items: center;
        }

        .layout-thumb .mini-diamond-wrap {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .layout-thumb .mini-diamond {
            position: absolute;
            background: #e8e8e8;
            border-radius: 2px;
            transform: rotate(45deg);
        }

        .controls-wrap {
            padding: 20px 48px 0;
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .palette {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .swatch {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2.5px solid transparent;
            cursor: pointer;
            outline: 1.5px solid var(--border);
        }

        .swatch.active {
            outline-color: var(--accent);
            outline-width: 2px;
            outline-offset: 2px;
        }

        .width-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .range-input {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }

        .range-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        .width-val {
            font-size: 0.78rem;
            font-weight: 500;
            min-width: 36px;
            color: var(--text-muted);
        }

        .wm-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .toggle-track {
            width: 34px;
            height: 18px;
            border-radius: 9px;
            background: var(--border);
            position: relative;
            transition: background 0.2s;
        }

        .toggle-track.on {
            background: var(--accent);
        }

        .toggle-knob {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--surface);
            position: absolute;
            top: 2px;
            left: 2px;
            transition: left 0.2s;
        }

        .toggle-track.on .toggle-knob {
            left: 18px;
        }

        .toggle-label {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .wm-input {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            padding: 5px 10px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text);
            width: 150px;
        }

        .wm-pos-group {
            display: flex;
            gap: 4px;
        }

        .wm-pos-btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.65rem;
            padding: 3px 8px;
            border: 1.5px solid var(--border);
            border-radius: 4px;
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
        }

        .wm-pos-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .watermark-overlay {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
            padding: 10px 14px;
            white-space: nowrap;
        }

        .watermark-overlay.pos-bl {
            bottom: 0;
            left: 0;
        }

        .watermark-overlay.pos-br {
            bottom: 0;
            right: 0;
        }

        .watermark-overlay.pos-tl {
            top: 0;
            left: 0;
        }

        .watermark-overlay.pos-tr {
            top: 0;
            right: 0;
        }

        .watermark-overlay.pos-c {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .canvas-wrap {
            padding: 24px 48px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #download-wrapper {
            width: 100%;
            max-width: 780px;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            background: #ffffff;
            border: 1px solid var(--border);
        }

        #collage-container {
            width: 100%;
            height: 100%;
            display: grid;
            gap: var(--gap);
            padding: var(--gap);
            position: relative;
        }

        .collage-cell {
            background: rgba(0, 0, 0, 0.06);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
            cursor: move;
        }

        .cell-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: 50% 50%;
            background-repeat: no-repeat;
            pointer-events: none;
        }

        .cell-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0, 0, 0, 0.18);
            pointer-events: none;
        }

        .cell-remove {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 0.6rem;
            display: none;
            place-items: center;
            z-index: 5;
        }

        .collage-cell.filled:hover .cell-remove {
            display: grid;
        }

        .collage-cell.circle-cell {
            background: transparent !important;
            overflow: visible;
        }

        .circle-mask {
            aspect-ratio: 1 / 1;
            width: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.06);
            position: relative;
            margin: auto;
        }

        #collage-container.diamond-mode {
            display: block !important;
            padding: 0 !important;
            gap: 0 !important;
        }

        .diamond-cell {
            position: absolute;
            transform: rotate(45deg);
            border-radius: 16px;
            overflow: hidden;
            cursor: move;
            background: rgba(0, 0, 0, 0.06);
        }

        .diamond-cell .diamond-inner {
            position: absolute;
            inset: 0;
            overflow: hidden;
            border-radius: inherit;
        }

        .diamond-cell .diamond-inner .diamond-bg {
            position: absolute;
            width: 142%;
            height: 142%;
            top: 50%;
            left: 50%;
            transform: rotate(-45deg) translate(-50%, -50%);
            transform-origin: top left;
            background-size: cover;
            background-position: 50% 50%;
            pointer-events: none;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 9px 22px;
            border-radius: 100px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn.primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        input[type="file"] {
            display: none;
        }

        footer {
            text-align: center;
            padding: 16px 48px 28px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        footer span {
            color: #e25555;
        }

        @media (max-width: 640px) {

            header,
            .picker-wrap,
            .controls-wrap,
            .canvas-wrap {
                padding-left: 16px;
                padding-right: 16px;
            }

            header h1 {
                font-size: 1.4rem;
            }

            .layout-thumb {
                width: 78px;
                height: 54px;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>Collage <span>Studio</span></h1>
        <div class="status" id="status">Select a layout to begin</div>
    </header>

    <div class="picker-wrap">
        <div class="section-label">Layout</div>
        <div class="picker" id="picker"></div>
    </div>

    <div class="controls-wrap">
        <div class="control-group">
            <div class="section-label">Background</div>
            <div class="palette" id="palette"></div>
        </div>
        <div class="control-group">
            <div class="section-label">Grid Width</div>
            <div class="width-control">
                <input type="range" class="range-input" id="width-slider" min="50" max="100" value="100" step="5">
                <span class="width-val" id="width-val">100%</span>
            </div>
        </div>
        <div class="control-group">
            <div class="section-label">Watermark</div>
            <div class="wm-row">
                <div class="toggle-wrap" id="wm-toggle">
                    <div class="toggle-track" id="wm-track">
                        <div class="toggle-knob"></div>
                    </div>
                    <span class="toggle-label">Off</span>
                </div>
                <input type="text" class="wm-input" id="wm-text" placeholder="Your text here…" disabled maxlength="60">
                <div class="wm-pos-group" id="wm-pos-group">
                    <button class="wm-pos-btn active" data-pos="br" disabled>BR</button>
                    <button class="wm-pos-btn" data-pos="bl" disabled>BL</button>
                    <button class="wm-pos-btn" data-pos="tr" disabled>TR</button>
                    <button class="wm-pos-btn" data-pos="tl" disabled>TL</button>
                    <button class="wm-pos-btn" data-pos="c" disabled>C</button>
                </div>
            </div>
        </div>
    </div>

    <div class="canvas-wrap">
        <div id="download-wrapper">
            <div id="collage-container"></div>
            <div class="watermark-overlay pos-br" id="watermark" style="display:none;"></div>
        </div>
        <div class="actions">
            <button class="btn" id="btn-upload">Upload Images</button>
            <button class="btn" id="btn-clear">Clear All</button>
            <button class="btn primary" id="btn-download" disabled>Download Collage</button>
        </div>
    </div>

    <footer>Built with <span>❤️</span> by Accolades</footer>

    <input type="file" id="file-input" multiple accept="image/*">

    <script>

            { name: 'Peach', css: 'linear-gradient(135deg, #e8b888 0%, #f0d8b8 100%)' },
            { name: 'Lavender', css: 'linear-gradient(135deg, #b098cc 0%, #d0c0e8 100%)' },
            { name: 'Midnight', css: 'linear-gradient(135deg, #141428 0%, #1a2840 100%)' },
            { name: 'Wine', css: 'linear-gradient(135deg, #3e0e22 0%, #681838 100%)' },
            { name: 'Sunset', css: 'linear-gradient(135deg, #e8634a 0%, #f5a623 100%)' },
            { name: 'Ocean', css: 'linear-gradient(135deg, #1a3a5c 0%, #2980b9 100%)' },
            { name: 'Forest', css: 'linear-gradient(135deg, #1a3c2a 0%, #2d6b4e 100%)' },
            { name: 'Rose Gold', css: 'linear-gradient(135deg, #b76e79 0%, #e8c8b0 100%)' },
            { name: 'Slate', css: 'linear-gradient(135deg, #4a5568 0%, #718096 100%)' },
            { name: 'Coral', css: 'linear-gradient(135deg, #ff6b6b 0%, #ffa07a 100%)' },
            { name: 'Aurora', css: 'linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #533483 100%)' },
            { name: 'Honey', css: 'linear-gradient(135deg, #f6d365 0%, #fda085 100%)' },
        ];

        let activeLayout = 0, images = [], cellAssignments = [], cellPositions = [], activeBg = 0, gridWidth = 100, wmEnabled = false, wmText = '', wmPosition = 'br';

        const container = document.getElementById('collage-container'), wrapper = document.getElementById('download-wrapper'), fileInput = document.getElementById('file-input'), statusEl = document.getElementById('status'), btnDownload = document.getElementById('btn-download'), wmOverlay = document.getElementById('watermark');

        // Drag Logic State
        let isDragging = false, startX, startY, currentCellIndex = null;

        function getCellCount (l) { return l.type === 'diamond' ? l.count : l.cells.length; }

        function selectLayout (idx) {
            activeLayout = idx;
            document.querySelectorAll('.layout-thumb').forEach((t, j) => t.classList.toggle('active', j === idx));
            const layout = LAYOUTS[idx];
            const count = getCellCount(layout);
            cellAssignments = new Array(count).fill(null);
            cellPositions = new Array(count).fill({ x: 50, y: 50 });
            wrapper.style.aspectRatio = layout.aspect || '4 / 3';
            renderGrid(); updateStatus();
        }

        function renderGrid () {
            const layout = LAYOUTS[activeLayout]; container.innerHTML = '';
            container.className = layout.type === 'diamond' ? 'diamond-mode' : '';
            if (layout.type === 'diamond') renderDiamond(layout); else renderCells(layout);
            applyWidth();
        }

        function renderCells (layout) {
            container.style.display = 'grid';
            container.style.gridTemplateColumns = layout.cols;
            container.style.gridTemplateRows = layout.rows;
            layout.cells.forEach((def, i) => {
                const cell = document.createElement('div');
                cell.className = 'collage-cell' + (def.circle ? ' circle-cell' : '');
                cell.style.gridColumn = def.col; cell.style.gridRow = def.row;
                const inner = def.circle ? document.createElement('div') : cell;
                if (def.circle) { inner.className = 'circle-mask'; cell.appendChild(inner); }
                setupCellContent(cell, inner, i);
                container.appendChild(cell);
            });
        }

        function renderDiamond (layout) {
            layout.diamonds.forEach((d, i) => {
                const cell = document.createElement('div'); cell.className = 'diamond-cell';
                cell.style.cssText = `width:${d.size}%;height:0;padding-bottom:${d.size}%;left:${d.x - d.size / 2}%;top:${d.y - d.size / 2}%;`;
                const inner = document.createElement('div'); inner.className = 'diamond-inner';
                setupCellContent(cell, inner, i, true);
                cell.appendChild(inner); container.appendChild(cell);
            });
        }

        function setupCellContent (cell, inner, i, isDiamond = false) {
            if (cellAssignments[i] !== null) {
                cell.classList.add('filled');
                const bg = document.createElement('div');
                bg.className = isDiamond ? 'diamond-bg' : 'cell-bg';
                bg.style.backgroundImage = `url(${images[cellAssignments[i]].dataUrl})`;
                bg.style.backgroundPosition = `${cellPositions[i].x}% ${cellPositions[i].y}%`;
                inner.appendChild(bg);
                inner.appendChild(makeRemoveBtn(i));
                cell.onmousedown = (e) => startDrag(e, i, bg);
            } else {
                inner.innerHTML = `<div class="cell-placeholder"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg></div>`;
                cell.onclick = () => { currentCellIndex = i; fileInput.click(); };
            }
        }

        function startDrag (e, i, bgEl) {
            if (e.target.classList.contains('cell-remove')) return;
            isDragging = true;
            startX = e.clientX; startY = e.clientY;
            const initialX = cellPositions[i].x;
            const initialY = cellPositions[i].y;

            const onMove = (moveEvent) => {
                if (!isDragging) return;
                const dx = moveEvent.clientX - startX;
                const dy = moveEvent.clientY - startY;
                const newX = Math.max(0, Math.min(100, initialX - (dx / container.offsetWidth * 100)));
                const newY = Math.max(0, Math.min(100, initialY - (dy / container.offsetHeight * 100)));
                cellPositions[i] = { x: newX, y: newY };
                bgEl.style.backgroundPosition = `${newX}% ${newY}%`;
            };

            const onUp = () => { isDragging = false; window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
        }

        function makeRemoveBtn (i) {
            const btn = document.createElement('button'); btn.className = 'cell-remove'; btn.innerHTML = '✕';
            btn.onclick = (e) => { e.stopPropagation(); cellAssignments[i] = null; renderGrid(); updateStatus(); };
            return btn;
        }

        fileInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            const process = (f, slot) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const idx = images.length; images.push({ dataUrl: ev.target.result });
                    cellAssignments[slot] = idx; renderGrid(); updateStatus();
                };
                reader.readAsDataURL(f);
            };
            if (currentCellIndex !== null) process(files[0], currentCellIndex);
            fileInput.value = ''; currentCellIndex = null;
        };

        btnDownload.onclick = async () => {
            btnDownload.textContent = 'Baking 4K...';
            const originalBorder = wrapper.style.border;
            wrapper.style.border = 'none'; wrapper.style.borderRadius = '0';

            const targetWidth = 3840;
            const scale = targetWidth / wrapper.offsetWidth;

            const canvas = await html2canvas(wrapper, {
                scale: scale,
                useCORS: true,
                backgroundColor: null,
                onclone: (clonedDoc) => {
                    clonedDoc.getElementById('download-wrapper').style.boxShadow = 'none';
                }
            });

            const link = document.createElement('a');
            link.download = `collage_4k.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
            wrapper.style.border = originalBorder;
            btnDownload.textContent = 'Download Collage';
        };

        // UI Helpers
        const applyBg = () => wrapper.style.background = COLORS[activeBg].css;
        const applyWidth = () => { container.style.width = gridWidth + '%'; container.style.height = gridWidth + '%'; };
        const updateStatus = () => {
            const filled = cellAssignments.filter(a => a !== null).length;
            statusEl.innerHTML = `<strong>${filled}</strong> / ${getCellCount(LAYOUTS[activeLayout])} images placed`;
            btnDownload.disabled = filled < getCellCount(LAYOUTS[activeLayout]);
        };

        // Controls Initialization
        document.getElementById('width-slider').oninput = (e) => { gridWidth = e.target.value; document.getElementById('width-val').innerText = gridWidth + '%'; applyWidth(); };
        document.getElementById('wm-toggle').onclick = () => { wmEnabled = !wmEnabled; document.getElementById('wm-track').classList.toggle('on', wmEnabled); document.getElementById('wm-text').disabled = !wmEnabled; document.getElementById('wm-pos-group').querySelectorAll('.wm-pos-btn').forEach(b => b.disabled = !wmEnabled); updateWatermark(); };
        document.getElementById('wm-text').oninput = (e) => { wmText = e.target.value; updateWatermark(); };
        document.getElementById('wm-pos-group').onclick = (e) => { const btn = e.target.closest('.wm-pos-btn'); if (!btn || btn.disabled) return; wmPosition = btn.dataset.pos; document.getElementById('wm-pos-group').querySelectorAll('.wm-pos-btn').forEach(b => b.classList.toggle('active', b.dataset.pos === wmPosition)); updateWatermark(); };
        function updateWatermark () { if (!wmEnabled || !wmText.trim()) { wmOverlay.style.display = 'none'; return; } wmOverlay.style.display = 'block'; wmOverlay.textContent = wmText; wmOverlay.className = 'watermark-overlay pos-' + wmPosition; }

        // Layout Picker Init
        LAYOUTS.forEach((l, i) => {
            const thumb = document.createElement('div');
            thumb.className = 'layout-thumb' + (i === 0 ? ' active' : '');

            if (l.type === 'diamond') {
                const wrap = document.createElement('div');
                wrap.className = 'mini-diamond-wrap';
                l.diamonds.forEach(d => {
                    const el = document.createElement('div');
                    el.className = 'mini-diamond';
                    const sz = d.size * 0.35;
                    const szH = sz * 1.78;
                    el.style.cssText = `width:${sz}%;height:${szH}%;left:${d.x * 0.9 - sz / 2 + 4}%;top:${d.y * 0.9 - szH / 2 + 2}%;`;
                    wrap.appendChild(el);
                });
                thumb.appendChild(wrap);
            } else {
                const miniGrid = document.createElement('div');
                miniGrid.className = 'mini-grid';
                miniGrid.style.gridTemplateColumns = l.cols;
                miniGrid.style.gridTemplateRows = l.rows;
                l.cells.forEach(c => {
                    const el = document.createElement('div');
                    el.className = 'cell' + (c.circle ? ' circle' : '');
                    el.style.gridColumn = c.col;
                    el.style.gridRow = c.row;
                    if (c.circle) {
                        el.style.display = 'flex';
                        el.style.alignItems = 'center';
                        el.style.justifyContent = 'center';
                        el.style.background = 'transparent';
                        const dot = document.createElement('div');
                        dot.style.cssText = 'aspect-ratio:1;max-width:100%;max-height:100%;border-radius:50%;background:#e8e8e8;width:100%;';
                        el.appendChild(dot);
                    }
                    miniGrid.appendChild(el);
                });
                thumb.appendChild(miniGrid);
            }

            const badge = document.createElement('div');
            badge.className = 'count-badge';
            badge.textContent = getCellCount(l);
            thumb.appendChild(badge);

            thumb.onclick = () => selectLayout(i);
            document.getElementById('picker').appendChild(thumb);
        });

        // Palette Init
        COLORS.forEach((c, i) => {
            const sw = document.createElement('div'); sw.className = 'swatch' + (i === 0 ? ' active' : ''); sw.style.background = c.css;
            sw.onclick = () => { activeBg = i; document.querySelectorAll('.swatch').forEach((s, j) => s.classList.toggle('active', j === i)); applyBg(); };
            document.getElementById('palette').appendChild(sw);
        });

        // Upload & Clear
        document.getElementById('btn-upload').onclick = () => { currentCellIndex = null; fileInput.click(); };
        document.getElementById('btn-clear').onclick = () => { images = []; cellAssignments = new Array(getCellCount(LAYOUTS[activeLayout])).fill(null); cellPositions = new Array(getCellCount(LAYOUTS[activeLayout])).fill({ x: 50, y: 50 }); renderGrid(); updateStatus(); };

        selectLayout(0);
    </script>
</body>

</html>
