<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collage Studio</title>
    <meta name="description" content="A minimalist photo collage builder — upload, arrange, download.">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Collage Studio">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='96' fill='%23111'/%3E%3Crect x='40' y='40' width='200' height='200' rx='16' fill='%23fff' opacity='.9'/%3E%3Crect x='270' y='40' width='200' height='90' rx='16' fill='%23fff' opacity='.7'/%3E%3Crect x='270' y='160' width='200' height='80' rx='16' fill='%23fff' opacity='.5'/%3E%3Crect x='40' y='270' width='130' height='200' rx='16' fill='%23fff' opacity='.6'/%3E%3Crect x='200' y='270' width='270' height='200' rx='16' fill='%23fff' opacity='.8'/%3E%3C/svg%3E">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap');

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --border: #e0e0e0;
            --border-hover: #b8b8b8;
            --text: #111111;
            --text-muted: #999999;
            --accent: #111111;
            --radius: 10px;
            --gap: 4px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        header {
            padding: 36px 48px 0;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        header h1 {
            font-family: 'Instrument Serif', serif;
            font-weight: 400;
            font-size: 1.9rem;
            letter-spacing: -0.02em;
        }

        header h1 span {
            font-style: italic;
            color: var(--text-muted);
        }

        .status {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }

        .status strong {
            color: var(--text);
            font-weight: 500;
        }

        .section-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 500;
        }

        /* ── Layout Picker ── */
        .picker-wrap {
            padding: 24px 48px 0;
        }

        .picker {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 6px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .picker::-webkit-scrollbar {
            height: 3px;
        }

        .picker::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .layout-thumb {
            flex-shrink: 0;
            width: 100px;
            height: 70px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            padding: 5px;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--surface);
            position: relative;
            overflow: hidden;
        }

        .layout-thumb:hover {
            border-color: var(--border-hover);
        }

        .layout-thumb.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent);
        }

        .layout-thumb .mini-grid {
            width: 100%;
            height: 100%;
            display: grid;
            gap: 1.5px;
        }

        .layout-thumb .mini-grid .cell {
            background: #e8e8e8;
            border-radius: 1.5px;
            min-width: 0;
            min-height: 0;
        }

        .layout-thumb .mini-grid .cell.circle {
            border-radius: 50%;
        }

        .layout-thumb .count-badge {
            position: absolute;
            bottom: 3px;
            right: 3px;
            background: var(--accent);
            color: #fff;
            font-size: 0.55rem;
            font-weight: 500;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            line-height: 1;
        }

        .layout-thumb .mini-diamond-wrap {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .layout-thumb .mini-diamond {
            position: absolute;
            background: #e8e8e8;
            border-radius: 2px;
            transform: rotate(45deg);
        }

        /* ── Controls ── */
        .controls-wrap {
            padding: 20px 48px 0;
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .palette {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .swatch {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2.5px solid transparent;
            cursor: pointer;
            transition: transform 0.15s;
            outline: 1.5px solid var(--border);
            outline-offset: 0px;
        }

        .swatch:hover {
            transform: scale(1.15);
        }

        .swatch.active {
            outline-color: var(--accent);
            outline-width: 2px;
            outline-offset: 2px;
        }

        .width-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .range-input {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }

        .range-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        .range-input::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: none;
        }

        .width-val {
            font-size: 0.78rem;
            font-weight: 500;
            min-width: 36px;
            color: var(--text-muted);
        }

        /* ── Watermark Controls ── */
        .wm-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .toggle-track {
            width: 34px;
            height: 18px;
            border-radius: 9px;
            background: var(--border);
            position: relative;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .toggle-track.on {
            background: var(--accent);
        }

        .toggle-knob {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--surface);
            position: absolute;
            top: 2px;
            left: 2px;
            transition: left 0.2s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
        }

        .toggle-track.on .toggle-knob {
            left: 18px;
        }

        .toggle-label {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .wm-input {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            padding: 5px 10px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text);
            outline: none;
            width: 150px;
            transition: border-color 0.2s;
        }

        .wm-input:focus {
            border-color: var(--accent);
        }

        .wm-input:disabled {
            opacity: 0.35;
        }

        .wm-pos-group {
            display: flex;
            gap: 4px;
        }

        .wm-pos-btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.65rem;
            padding: 3px 8px;
            border: 1.5px solid var(--border);
            border-radius: 4px;
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.03em;
        }

        .wm-pos-btn:hover {
            border-color: var(--border-hover);
        }

        .wm-pos-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .wm-pos-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* ── Watermark Overlay (inside download-wrapper) ── */
        .watermark-overlay {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.04em;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
            padding: 10px 14px;
            white-space: nowrap;
        }

        .watermark-overlay.pos-bl {
            bottom: 0;
            left: 0;
        }

        .watermark-overlay.pos-br {
            bottom: 0;
            right: 0;
        }

        .watermark-overlay.pos-tl {
            top: 0;
            left: 0;
        }

        .watermark-overlay.pos-tr {
            top: 0;
            right: 0;
        }

        .watermark-overlay.pos-c {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* ── Main Canvas ── */
        .canvas-wrap {
            padding: 24px 48px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #download-wrapper {
            width: 100%;
            max-width: 780px;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            background: #ffffff;
            border: 1px solid var(--border);
        }

        #collage-container {
            width: 100%;
            height: 100%;
            display: grid;
            gap: var(--gap);
            padding: var(--gap);
            position: relative;
            overflow: hidden;
        }

        /* ══════════════════════════════════
     IMAGE CELLS — background-image for html2canvas compat
     ══════════════════════════════════ */
        .collage-cell {
            background: rgba(0, 0, 0, 0.06);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: background 0.15s;
            min-width: 0;
            min-height: 0;
        }

        .collage-cell:hover {
            background: rgba(0, 0, 0, 0.09);
        }

        .collage-cell.filled {
            cursor: default;
        }

        .collage-cell.filled:hover {
            background: initial;
        }

        /* All images rendered as divs with background-image */
        .cell-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        .cell-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0, 0, 0, 0.18);
            pointer-events: none;
        }

        .cell-placeholder svg {
            opacity: 0.5;
        }

        .cell-remove {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 0.6rem;
            display: none;
            place-items: center;
            line-height: 1;
            z-index: 5;
        }

        .collage-cell.filled:hover .cell-remove {
            display: grid;
        }

        .cell-remove:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        /* ── Circle cell — PERFECT CIRCLE ── */
        .collage-cell.circle-cell {
            background: transparent !important;
            overflow: visible;
        }

        .circle-mask {
            aspect-ratio: 1 / 1;
            max-width: 100%;
            max-height: 100%;
            width: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.06);
            position: relative;
            margin: auto;
        }

        .collage-cell.circle-cell:hover .circle-mask {
            background: rgba(0, 0, 0, 0.09);
        }

        .collage-cell.circle-cell.filled:hover .circle-mask {
            background: rgba(0, 0, 0, 0.06);
        }

        .circle-mask .cell-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            border-radius: 50%;
        }

        .circle-mask .cell-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .circle-mask .cell-remove {
            position: absolute;
            top: 8px;
            right: 8px;
        }

        /* ── Diamond Layout ── */
        #collage-container.diamond-mode {
            display: block !important;
            padding: 0 !important;
            gap: 0 !important;
        }

        .diamond-cell {
            position: absolute;
            transform: rotate(45deg);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.06);
            transition: background 0.15s;
        }

        .diamond-cell:hover {
            background: rgba(0, 0, 0, 0.09);
        }

        .diamond-cell.filled {
            cursor: default;
            background: transparent;
        }

        .diamond-cell.filled:hover {
            background: transparent;
        }

        .diamond-cell .diamond-inner {
            position: absolute;
            inset: 0;
            overflow: hidden;
            border-radius: inherit;
        }

        /* Diamond images: use background-image for perfect center-crop with no stretch */
        .diamond-cell .diamond-inner .diamond-bg {
            position: absolute;
            /* Expand beyond the rotated square to fill visible diamond area */
            width: 142%;
            height: 142%;
            top: 50%;
            left: 50%;
            transform: rotate(-45deg) translate(-50%, -50%);
            transform-origin: top left;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        .diamond-cell .cell-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(-45deg);
        }

        .diamond-cell .cell-remove {
            position: absolute;
            top: 35%;
            right: 35%;
            transform: rotate(-45deg);
        }

        /* ── Actions ── */
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 9px 22px;
            border-radius: 100px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.02em;
        }

        .btn:hover {
            border-color: var(--accent);
        }

        .btn.primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .btn.primary:hover {
            background: #333;
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        input[type="file"] {
            display: none;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 16px 48px 28px;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }

        footer span {
            color: #e25555;
        }

        /* ── PWA Install Banner ── */
        .install-banner {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #fff;
            padding: 10px 24px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            display: none;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .install-banner:hover {
            transform: translateX(-50%) scale(1.03);
        }

        .install-banner .close-install {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            padding: 0 0 0 8px;
        }

        @media (max-width: 640px) {

            header,
            .picker-wrap,
            .controls-wrap,
            .canvas-wrap {
                padding-left: 16px;
                padding-right: 16px;
            }

            footer {
                padding-left: 16px;
                padding-right: 16px;
            }

            header h1 {
                font-size: 1.4rem;
            }

            .layout-thumb {
                width: 78px;
                height: 54px;
            }

            .controls-wrap {
                gap: 16px;
            }

            .wm-input {
                width: 120px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Collage <span>Studio</span></h1>
        <div class="status" id="status">Select a layout to begin</div>
    </header>

    <div class="picker-wrap">
        <div class="section-label">Layout</div>
        <div class="picker" id="picker"></div>
    </div>

    <div class="controls-wrap">
        <div class="control-group">
            <div class="section-label">Background</div>
            <div class="palette" id="palette"></div>
        </div>
        <div class="control-group">
            <div class="section-label">Grid Width</div>
            <div class="width-control">
                <input type="range" class="range-input" id="width-slider" min="50" max="100" value="100" step="5">
                <span class="width-val" id="width-val">100%</span>
            </div>
        </div>
        <div class="control-group">
            <div class="section-label">Watermark</div>
            <div class="wm-row">
                <div class="toggle-wrap" id="wm-toggle">
                    <div class="toggle-track" id="wm-track">
                        <div class="toggle-knob"></div>
                    </div>
                    <span class="toggle-label">Off</span>
                </div>
                <input type="text" class="wm-input" id="wm-text" placeholder="Your text here…" disabled maxlength="60">
                <div class="wm-pos-group" id="wm-pos-group">
                    <button class="wm-pos-btn active" data-pos="br" disabled>BR</button>
                    <button class="wm-pos-btn" data-pos="bl" disabled>BL</button>
                    <button class="wm-pos-btn" data-pos="tr" disabled>TR</button>
                    <button class="wm-pos-btn" data-pos="tl" disabled>TL</button>
                    <button class="wm-pos-btn" data-pos="c" disabled>C</button>
                </div>
            </div>
        </div>
    </div>

    <div class="canvas-wrap">
        <div id="download-wrapper">
            <div id="collage-container"></div>
            <div class="watermark-overlay pos-br" id="watermark" style="display:none;"></div>
        </div>
        <div class="actions">
            <button class="btn" id="btn-upload">Upload Images</button>
            <button class="btn" id="btn-clear">Clear All</button>
            <button class="btn primary" id="btn-download" disabled>Download Collage</button>
        </div>
    </div>

    <footer>Built with <span>❤️</span> by Accolades</footer>

    <!-- PWA Install Prompt -->
    <div class="install-banner" id="install-banner">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 5v14M5 12l7 7 7-7" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Install Collage Studio
        <button class="close-install" id="close-install">✕</button>
    </div>

    <input type="file" id="file-input" multiple accept="image/*">

    <script>
        // ═══════════════════════════════════════════════
        // LAYOUTS
        // ═══════════════════════════════════════════════

        const LAYOUTS = [
            {
                name: 'Diamond',
                type: 'diamond',
                aspect: '16 / 9',
                count: 7,
                diamonds: [
                    { x: 24.5, y: 27, size: 25 },
                    { x: 50, y: 27, size: 25 },
                    { x: 75.5, y: 27, size: 25 },
                    { x: 11.5, y: 64, size: 25 },
                    { x: 37, y: 64, size: 25 },
                    { x: 62.5, y: 64, size: 25 },
                    { x: 88, y: 64, size: 25 },
                ]
            },
            {
                name: 'Classic Grid',
                type: 'grid',
                cols: 'repeat(3, 1fr)', rows: 'repeat(3, 1fr)',
                cells: [
                    { col: '1/2', row: '1/2' }, { col: '2/3', row: '1/2' }, { col: '3/4', row: '1/2' },
                    { col: '1/2', row: '2/3' }, { col: '2/3', row: '2/3' }, { col: '3/4', row: '2/3' },
                    { col: '1/2', row: '3/4' }, { col: '2/3', row: '3/4' }, { col: '3/4', row: '3/4' },
                ]
            },
            {
                name: 'Hero Left',
                type: 'grid',
                cols: 'repeat(4, 1fr)', rows: 'repeat(3, 1fr)',
                cells: [
                    { col: '1/3', row: '1/3' },
                    { col: '3/4', row: '1/2' }, { col: '4/5', row: '1/2' },
                    { col: '3/4', row: '2/3' }, { col: '4/5', row: '2/3' },
                    { col: '1/2', row: '3/4' }, { col: '2/3', row: '3/4' }, { col: '3/4', row: '3/4' }, { col: '4/5', row: '3/4' },
                ]
            },
            {
                name: 'Focus Center',
                type: 'grid',
                cols: 'repeat(4, 1fr)', rows: 'repeat(3, 1fr)',
                cells: [
                    { col: '1/2', row: '1/2' }, { col: '2/3', row: '1/2' }, { col: '3/4', row: '1/2' }, { col: '4/5', row: '1/2' },
                    { col: '1/2', row: '2/3' }, { col: '2/4', row: '2/3', circle: true }, { col: '4/5', row: '2/3' },
                    { col: '1/2', row: '3/4' }, { col: '2/3', row: '3/4' }, { col: '3/4', row: '3/4' }, { col: '4/5', row: '3/4' },
                ]
            },
            {
                name: 'Magazine',
                type: 'grid',
                cols: '2fr 1fr 1fr 1fr 1fr 2fr', rows: 'repeat(4, 1fr)',
                cells: [
                    { col: '1/3', row: '1/3' },
                    { col: '3/4', row: '1/2' },
                    { col: '4/5', row: '1/2' },
                    { col: '5/6', row: '1/2' },
                    { col: '6/7', row: '1/3' },
                    { col: '3/4', row: '2/3' },
                    { col: '4/6', row: '2/4', circle: true },
                    { col: '6/7', row: '3/4' },
                    { col: '1/2', row: '3/5' },
                    { col: '2/4', row: '3/5' },
                    { col: '4/5', row: '4/5' },
                    { col: '5/7', row: '4/5' },
                ]
            },
            {
                name: 'Mosaic',
                type: 'grid',
                cols: '1.2fr 1fr 1fr 1.2fr', rows: '1fr 1fr 1.3fr 1fr',
                cells: [
                    { col: '1/2', row: '1/3' },
                    { col: '2/3', row: '1/2' },
                    { col: '3/5', row: '1/2' },
                    { col: '2/3', row: '2/3' },
                    { col: '3/4', row: '2/3' },
                    { col: '4/5', row: '2/3' },
                    { col: '1/2', row: '3/4' },
                    { col: '2/4', row: '3/4' },
                    { col: '4/5', row: '3/5' },
                    { col: '1/3', row: '4/5' },
                    { col: '3/4', row: '4/5' },
                ]
            },
            {
                name: 'Asymmetric',
                type: 'grid',
                cols: 'repeat(4, 1fr)', rows: 'repeat(3, 1fr)',
                cells: [
                    { col: '1/3', row: '1/2' }, { col: '3/4', row: '1/2' }, { col: '4/5', row: '1/2' },
                    { col: '1/2', row: '2/3' }, { col: '2/4', row: '2/4' },
                    { col: '4/5', row: '2/3' },
                    { col: '1/2', row: '3/4' }, { col: '4/5', row: '3/4' },
                ]
            },
            {
                name: 'Wide Strip',
                type: 'grid',
                cols: 'repeat(3, 1fr)', rows: '2fr 1fr 2fr',
                cells: [
                    { col: '1/2', row: '1/2' }, { col: '2/3', row: '1/2' }, { col: '3/4', row: '1/2' },
                    { col: '1/4', row: '2/3' },
                    { col: '1/2', row: '3/4' }, { col: '2/3', row: '3/4' }, { col: '3/4', row: '3/4' },
                ]
            },
            {
                name: 'Duo',
                type: 'grid',
                cols: 'repeat(4, 1fr)', rows: 'repeat(2, 1fr)',
                cells: [
                    { col: '1/3', row: '1/2' }, { col: '3/4', row: '1/2' }, { col: '4/5', row: '1/2' },
                    { col: '1/2', row: '2/3' }, { col: '2/3', row: '2/3' }, { col: '3/5', row: '2/3' },
                ]
            },
            {
                name: 'Quad',
                type: 'grid',
                cols: 'repeat(2, 1fr)', rows: 'repeat(2, 1fr)',
                cells: [
                    { col: '1/2', row: '1/2' }, { col: '2/3', row: '1/2' },
                    { col: '1/2', row: '2/3' }, { col: '2/3', row: '2/3' },
                ]
            },
        ];

        // ═══════════════════════════════════════════════
        // COLORS
        // ═══════════════════════════════════════════════

        const COLORS = [
            { name: 'White', css: '#ffffff' },
            { name: 'Snow', css: '#f2f2f2' },
            { name: 'Silver', css: '#d0d0d0' },
            { name: 'Charcoal', css: '#3a3a3a' },
            { name: 'Black', css: '#0a0a0a' },
            { name: 'Blush', css: 'linear-gradient(135deg, #d4a0b0 0%, #e8cdb5 100%)' },
            { name: 'Sky', css: 'linear-gradient(135deg, #92b8d8 0%, #c0d8ee 100%)' },
            { name: 'Sage', css: 'linear-gradient(135deg, #9aba92 0%, #c4ddb8 100%)' },
            { name: 'Peach', css: 'linear-gradient(135deg, #e8b888 0%, #f0d8b8 100%)' },
            { name: 'Lavender', css: 'linear-gradient(135deg, #b098cc 0%, #d0c0e8 100%)' },
            { name: 'Midnight', css: 'linear-gradient(135deg, #141428 0%, #1a2840 100%)' },
            { name: 'Wine', css: 'linear-gradient(135deg, #3e0e22 0%, #681838 100%)' },
        ];

        // ═══════════════════════════════════════════════
        // STATE
        // ═══════════════════════════════════════════════

        let activeLayout = 0;
        let images = [];
        let cellAssignments = [];
        let pendingCellIndex = null;
        let activeBg = 0;
        let gridWidth = 100;
        let wmEnabled = false;
        let wmText = '';
        let wmPosition = 'br';

        // ═══════════════════════════════════════════════
        // DOM REFS
        // ═══════════════════════════════════════════════

        const picker = document.getElementById('picker');
        const container = document.getElementById('collage-container');
        const wrapper = document.getElementById('download-wrapper');
        const btnUpload = document.getElementById('btn-upload');
        const btnClear = document.getElementById('btn-clear');
        const btnDownload = document.getElementById('btn-download');
        const fileInput = document.getElementById('file-input');
        const statusEl = document.getElementById('status');
        const paletteEl = document.getElementById('palette');
        const widthSlider = document.getElementById('width-slider');
        const widthValEl = document.getElementById('width-val');
        const wmToggle = document.getElementById('wm-toggle');
        const wmTrack = document.getElementById('wm-track');
        const wmInput = document.getElementById('wm-text');
        const wmPosGroup = document.getElementById('wm-pos-group');
        const wmOverlay = document.getElementById('watermark');

        // ═══════════════════════════════════════════════
        // PICKER THUMBNAILS
        // ═══════════════════════════════════════════════

        LAYOUTS.forEach((layout, i) => {
            const thumb = document.createElement('div');
            thumb.className = 'layout-thumb' + (i === 0 ? ' active' : '');
            thumb.title = layout.name;

            if (layout.type === 'diamond') {
                const wrap = document.createElement('div');
                wrap.className = 'mini-diamond-wrap';
                layout.diamonds.forEach(d => {
                    const el = document.createElement('div');
                    el.className = 'mini-diamond';
                    const sz = d.size * 0.35;
                    const szH = sz * 1.78;
                    el.style.cssText = `width:${sz}%;height:${szH}%;left:${d.x * 0.9 - sz / 2 + 4}%;top:${d.y * 0.9 - szH / 2 + 2}%;`;
                    wrap.appendChild(el);
                });
                thumb.appendChild(wrap);
            } else {
                const miniGrid = document.createElement('div');
                miniGrid.className = 'mini-grid';
                miniGrid.style.gridTemplateColumns = layout.cols;
                miniGrid.style.gridTemplateRows = layout.rows;
                layout.cells.forEach(c => {
                    const el = document.createElement('div');
                    el.className = 'cell' + (c.circle ? ' circle' : '');
                    el.style.gridColumn = c.col;
                    el.style.gridRow = c.row;
                    if (c.circle) {
                        el.style.display = 'flex';
                        el.style.alignItems = 'center';
                        el.style.justifyContent = 'center';
                        el.style.background = 'transparent';
                        const dot = document.createElement('div');
                        dot.style.cssText = 'aspect-ratio:1;max-width:100%;max-height:100%;border-radius:50%;background:#e8e8e8;width:100%;';
                        el.appendChild(dot);
                    }
                    miniGrid.appendChild(el);
                });
                thumb.appendChild(miniGrid);
            }

            const badge = document.createElement('div');
            badge.className = 'count-badge';
            badge.textContent = getCellCount(layout);
            thumb.appendChild(badge);

            thumb.addEventListener('click', () => selectLayout(i));
            picker.appendChild(thumb);
        });

        function getCellCount (l) {
            return l.type === 'diamond' ? l.count : l.cells.length;
        }

        // ═══════════════════════════════════════════════
        // COLOR PALETTE
        // ═══════════════════════════════════════════════

        COLORS.forEach((c, i) => {
            const sw = document.createElement('div');
            sw.className = 'swatch' + (i === 0 ? ' active' : '');
            sw.title = c.name;
            sw.style.background = c.css;
            sw.addEventListener('click', () => {
                activeBg = i;
                document.querySelectorAll('.swatch').forEach((s, j) => s.classList.toggle('active', j === i));
                applyBg();
            });
            paletteEl.appendChild(sw);
        });

        function applyBg () { wrapper.style.background = COLORS[activeBg].css; }

        // ═══════════════════════════════════════════════
        // WIDTH SLIDER
        // ═══════════════════════════════════════════════

        widthSlider.addEventListener('input', (e) => {
            gridWidth = parseInt(e.target.value);
            widthValEl.textContent = gridWidth + '%';
            applyWidth();
        });
        function applyWidth () {
            container.style.width = gridWidth + '%';
            container.style.height = gridWidth + '%';
        }

        // ═══════════════════════════════════════════════
        // WATERMARK
        // ═══════════════════════════════════════════════

        wmToggle.addEventListener('click', () => {
            wmEnabled = !wmEnabled;
            wmTrack.classList.toggle('on', wmEnabled);
            wmToggle.querySelector('.toggle-label').textContent = wmEnabled ? 'On' : 'Off';
            wmInput.disabled = !wmEnabled;
            wmPosGroup.querySelectorAll('.wm-pos-btn').forEach(b => b.disabled = !wmEnabled);
            updateWatermark();
        });

        wmInput.addEventListener('input', (e) => {
            wmText = e.target.value;
            updateWatermark();
        });

        wmPosGroup.addEventListener('click', (e) => {
            const btn = e.target.closest('.wm-pos-btn');
            if (!btn || btn.disabled) return;
            wmPosition = btn.dataset.pos;
            wmPosGroup.querySelectorAll('.wm-pos-btn').forEach(b => b.classList.toggle('active', b.dataset.pos === wmPosition));
            updateWatermark();
        });

        function updateWatermark () {
            if (!wmEnabled || !wmText.trim()) {
                wmOverlay.style.display = 'none';
                return;
            }
            wmOverlay.style.display = 'block';
            wmOverlay.textContent = wmText;
            wmOverlay.className = 'watermark-overlay pos-' + wmPosition;
        }

        // ═══════════════════════════════════════════════
        // SELECT LAYOUT
        // ═══════════════════════════════════════════════

        function selectLayout (idx) {
            activeLayout = idx;
            document.querySelectorAll('.layout-thumb').forEach((t, j) => t.classList.toggle('active', j === idx));
            const layout = LAYOUTS[idx];
            cellAssignments = new Array(getCellCount(layout)).fill(null);
            wrapper.style.aspectRatio = layout.aspect || '4 / 3';
            renderGrid();
            updateStatus();
        }

        // ═══════════════════════════════════════════════
        // RENDER
        // ═══════════════════════════════════════════════

        const PLACEHOLDER = `<div class="cell-placeholder"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg></div>`;

        function renderGrid () {
            const layout = LAYOUTS[activeLayout];
            container.innerHTML = '';

            if (layout.type === 'diamond') {
                container.classList.add('diamond-mode');
                container.style.gridTemplateColumns = '';
                container.style.gridTemplateRows = '';
                renderDiamond(layout);
            } else {
                container.classList.remove('diamond-mode');
                container.style.display = 'grid';
                container.style.gridTemplateColumns = layout.cols;
                container.style.gridTemplateRows = layout.rows;
                container.style.gap = 'var(--gap)';
                container.style.padding = 'var(--gap)';
                renderCells(layout);
            }
            applyWidth();
        }

        function renderCells (layout) {
            layout.cells.forEach((def, i) => {
                const cell = document.createElement('div');
                cell.className = 'collage-cell' + (def.circle ? ' circle-cell' : '');
                cell.style.gridColumn = def.col;
                cell.style.gridRow = def.row;

                if (def.circle) {
                    buildCircleCell(cell, i);
                } else {
                    buildNormalCell(cell, i);
                }
                container.appendChild(cell);
            });
        }

        function buildNormalCell (cell, i) {
            if (cellAssignments[i] !== null && images[cellAssignments[i]]) {
                cell.classList.add('filled');
                const bg = document.createElement('div');
                bg.className = 'cell-bg';
                bg.style.backgroundImage = `url(${images[cellAssignments[i]].dataUrl})`;
                cell.appendChild(bg);
                cell.appendChild(makeRemoveBtn(i));
            } else {
                cell.innerHTML = PLACEHOLDER;
                cell.addEventListener('click', () => { pendingCellIndex = i; fileInput.click(); });
            }
        }

        function buildCircleCell (cell, i) {
            const mask = document.createElement('div');
            mask.className = 'circle-mask';

            if (cellAssignments[i] !== null && images[cellAssignments[i]]) {
                cell.classList.add('filled');
                const bg = document.createElement('div');
                bg.className = 'cell-bg';
                bg.style.backgroundImage = `url(${images[cellAssignments[i]].dataUrl})`;
                mask.appendChild(bg);
                mask.appendChild(makeRemoveBtn(i));
            } else {
                mask.innerHTML = PLACEHOLDER;
                cell.addEventListener('click', () => { pendingCellIndex = i; fileInput.click(); });
            }
            cell.appendChild(mask);
        }

        function renderDiamond (layout) {
            layout.diamonds.forEach((d, i) => {
                const cell = document.createElement('div');
                cell.className = 'diamond-cell';

                const sz = d.size;
                cell.style.width = sz + '%';
                cell.style.height = '0';
                cell.style.paddingBottom = sz + '%';
                cell.style.left = (d.x - sz / 2) + '%';
                cell.style.top = (d.y - sz / 2) + '%';

                const inner = document.createElement('div');
                inner.className = 'diamond-inner';

                if (cellAssignments[i] !== null && images[cellAssignments[i]]) {
                    cell.classList.add('filled');
                    // Use a div with background-image for perfect center-crop, no stretch
                    const bg = document.createElement('div');
                    bg.className = 'diamond-bg';
                    bg.style.backgroundImage = `url(${images[cellAssignments[i]].dataUrl})`;
                    inner.appendChild(bg);
                    inner.appendChild(makeRemoveBtn(i));
                } else {
                    inner.innerHTML = PLACEHOLDER;
                    cell.addEventListener('click', () => { pendingCellIndex = i; fileInput.click(); });
                }

                cell.appendChild(inner);
                container.appendChild(cell);
            });
        }

        function makeRemoveBtn (i) {
            const btn = document.createElement('button');
            btn.className = 'cell-remove';
            btn.innerHTML = '✕';
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                cellAssignments[i] = null;
                renderGrid();
                updateStatus();
            });
            return btn;
        }

        function updateStatus () {
            const total = getCellCount(LAYOUTS[activeLayout]);
            const filled = cellAssignments.filter(a => a !== null).length;
            statusEl.innerHTML = `<strong>${filled}</strong> / ${total} images placed`;
            btnDownload.disabled = filled < total;
        }

        // ═══════════════════════════════════════════════
        // FILE HANDLING
        // ═══════════════════════════════════════════════

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;

            if (pendingCellIndex !== null) {
                readFile(files[0], (idx) => {
                    cellAssignments[pendingCellIndex] = idx;
                    pendingCellIndex = null;
                    renderGrid();
                    updateStatus();
                });
                files.slice(1).forEach(f => enqueueFile(f));
            } else {
                files.forEach(f => enqueueFile(f));
            }
            fileInput.value = '';
        });

        function readFile (file, cb) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const idx = images.length;
                images.push({ dataUrl: ev.target.result });
                cb(idx);
            };
            reader.readAsDataURL(file);
        }

        function enqueueFile (file) {
            readFile(file, (idx) => {
                const slot = cellAssignments.indexOf(null);
                if (slot !== -1) {
                    cellAssignments[slot] = idx;
                    renderGrid();
                    updateStatus();
                }
            });
        }

        btnUpload.addEventListener('click', () => { pendingCellIndex = null; fileInput.click(); });

        btnClear.addEventListener('click', () => {
            images = [];
            cellAssignments = new Array(getCellCount(LAYOUTS[activeLayout])).fill(null);
            renderGrid();
            updateStatus();
        });

        // ═══════════════════════════════════════════════
        // DOWNLOAD
        // ═══════════════════════════════════════════════

        btnDownload.addEventListener('click', async () => {
            btnDownload.textContent = 'Exporting…';
            btnDownload.disabled = true;

            const savedBorder = wrapper.style.border;
            const savedRadius = wrapper.style.borderRadius;
            wrapper.style.border = 'none';
            wrapper.style.borderRadius = '0';

            try {
                const canvas = await html2canvas(wrapper, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: null,
                });
                const link = document.createElement('a');
                link.download = 'collage.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                console.error('Export error:', err);
                alert('Export failed — please try again.');
            }

            wrapper.style.border = savedBorder;
            wrapper.style.borderRadius = savedRadius;
            btnDownload.textContent = 'Download Collage';
            updateStatus();
        });

        // ═══════════════════════════════════════════════
        // PWA — Service Worker + Install Prompt
        // ═══════════════════════════════════════════════

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => { });
        }

        let deferredPrompt = null;
        const installBanner = document.getElementById('install-banner');
        const closeInstall = document.getElementById('close-install');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'flex';
        });

        installBanner.addEventListener('click', (e) => {
            if (e.target === closeInstall || e.target.closest('.close-install')) {
                installBanner.style.display = 'none';
                return;
            }
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    deferredPrompt = null;
                    installBanner.style.display = 'none';
                });
            }
        });

        window.addEventListener('appinstalled', () => {
            installBanner.style.display = 'none';
        });

        // ═══════════════════════════════════════════════
        // BOOT
        // ═══════════════════════════════════════════════

        applyBg();
        selectLayout(0);
    </script>
</body>

</html>
